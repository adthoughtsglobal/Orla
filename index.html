<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orla Client</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/favicon.png" id="favicon">
</head>

<body class="flex x">
    <div class="serverslist">
s
    </div>

                <div class="loader"></div> 
                <img src="assets/logo_vector.svg">
            </div>
            <div id="interactive_logs" class="fill">
               
            </div>
            <div class="inputs">
                <input type="text" placeholder="send a message...">
            </div>
        </div>
        <div class="pane logs">
         <div id="logspane"></div>
            <div class="inputs">
                <input id="commandinput" type="text" placeholder="use commands...">
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script src="rotur.js"></script>
    <script src="commands.js"></script>
    <script src="app.js"></script>
