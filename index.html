<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orla Client</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="subset.css">
    <link rel="icon" type="image/png" href="assets/favicon.png" id="favicon">
</head>

<body class="flex x">
    <div class="serverslist">
        <div id="servers_list"></div>
    </div>
    <div class="cli flex fill x">
        <div class="interactive pane flex fill y">
            <div id="fullloader">
                <div class="loader"></div>
                <img src="assets/logo_vector.svg" id="loader_image">
            </div>
            <div id="interactive_logs" class="fill">

            </div>
            <div class="seebottom">[
                <span id="missedmsgs"></span> new messages ]
            </div>
            <div id="typing-indicator"></div>
            <div id="reply_preview"></div>
            <div class="inputs">
                <textarea id="mainTxtAr" type="text" placeholder="send a message..." rows="1"></textarea>
            </div>
        </div>
        <div class="pane logs">
            <div class="listssearch inputs">
                <input type="text" id="paneSearch" placeholder="search data in pane...">
            </div>
            <div id="listspane">
                <div class="empty">Use the pane command to show stuff here</div>
            </div>
            <div id="logspane"></div>
            <div id="autocomplete_list"></div>
            <div class="inputs">
                <textarea id="commandinput" rows="1" type="text" placeholder="use commands..."></textarea>
            </div>
        </div>
    </div>
    <div id="contextMenu" class="context-menu"></div>
    
    <script src="utility.js"></script>
    <script src="rotur.js" defer></script>
    <script src="script.js" defer></script>
    <script src="commands.js" defer></script>
    <script src="threads.js"></script>
    <script src="app.js"></script>
</body>

</html>
